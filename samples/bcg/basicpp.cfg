; ==============================================================
; BASIC++ Configuration File  (basicpp.cfg)
; ==============================================================
;
; This configuration file is automatically generated by BASIC++.
; It applies settings to the interpreter before execution begins.
;
; PRIORITY (lowest to highest):
;   1. Settings in this file
;   2. Command-line switches (-d GWBS, -S, -s STANDARD)
;   3. Runtime built-in overrides (OPTION, SECURITY, ALIAS, etc.)
;
; Lines starting with ; or # are comments. Unknown keys are ignored.
; ==============================================================

; --------------------------------------------------------------
; DIALECT
; --------------------------------------------------------------
; Sets the default BASIC dialect (behavior, syntax, keywords).
; Available:
;   PATB   - Palo Alto Tiny BASIC (default)
;   GWBS   - Microsoft GW-BASIC
;   QBAS   - Microsoft QBasic
;   E116   - ECMA-116 Standard BASIC
;   SUPA   - Sinclair QL SuperBASIC
;   SBAS   - Tymshare SUPER BASIC
;   (and many more like TRS1, TRS2, C64B, etc.)
;
dialect = GWBS,SBAS,E116

; --------------------------------------------------------------
; SECURITY
; --------------------------------------------------------------
; Defines the security sandbox for file I/O and shell execution.
;   OPEN       - Full access to filesystem and shell (default)
;   STANDARD   - Restricts shell access and limits file I/O to safe dirs
;   RESTRICTED - Completely disables file I/O, SHELL, and networking
;
security = STANDARD

; --------------------------------------------------------------
; STRICT
; --------------------------------------------------------------
; Keyword isolation mode.
;   ON  - Only keywords native to the active dialect are allowed.
;   OFF - All keywords from all dialects are available (default).
;
strict = OFF

; --------------------------------------------------------------
; QUIET
; --------------------------------------------------------------
; Controls the startup banner printing.
;   ON  - Suppress startup banner
;   OFF - Show startup banner (default)
;
; Example: quiet = OFF

; --------------------------------------------------------------
; SYNTAX QUIRKS & OVERRIDES
; --------------------------------------------------------------
; You can override specific syntax quirks or behaviors here.
; Note: Built-in commands like OPTION, ALIAS, KEYWORD, SCOPE,
; and OVERRIDE will take precedence over these settings at runtime.
;
